ipam:
  mode: kubernetes

kubeProxyReplacement: true
k8sServiceHost: 192.168.1.140
k8sServicePort: 6443

# Capabilities + cgroup overrides below are required for kube-proxy-free Talos.
securityContext:
  capabilities:
    ciliumAgent:
      - CHOWN
      - KILL
      - NET_ADMIN
      - NET_RAW
      - IPC_LOCK
      - SYS_ADMIN
      - SYS_RESOURCE
      - DAC_OVERRIDE
      - FOWNER
      - SETGID
      - SETUID
    cleanCiliumState:
      - NET_ADMIN
      - SYS_ADMIN
      - SYS_RESOURCE

cgroup:
  autoMount:
    enabled: false
  hostRoot: /sys/fs/cgroup

l2announcements:
  enabled: true
externalIPs:
  enabled: true
k8sClientRateLimit:
  qps: 50
  burst: 100

# nodeEncryption off: host-to-host encrypt adds non-trivial CPU on 4-core CM5s
# for limited threat-model gain on a LAN.
encryption:
  enabled: true
  type: wireguard
  nodeEncryption: false

hubble:
  enabled: true
  relay:
    enabled: true
  ui:
    enabled: true
  metrics:
    enabled:
      - dns
      - drop
      - "httpV2:exemplars=true;labelsContext=source_ip,source_namespace,source_workload,destination_ip,destination_namespace,destination_workload,traffic_direction"
    serviceMonitor:
      enabled: true

# Envoy metrics feed the "Gateway API Traffic" dashboard (per-route latency /
# status). Hubble L7 above is workload-aggregated; Envoy is route-aggregated.
envoy:
  prometheus:
    serviceMonitor:
      enabled: true

# Requires gateway-api-crds Kustomization installed first.
gatewayAPI:
  enabled: true

operator:
  replicas: 2

rollOutCiliumPods: true
