# Installed standalone: the vm-stack chart's
# `victoria-metrics-operator.prometheus-operator-crds.enabled: true` toggle is
# silently no-op in chart 0.78.0, and vm-operator crashloops without these CRDs.
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: prometheus-operator-crds
  namespace: observability
spec:
  interval: 1h
  chart:
    spec:
      chart: prometheus-operator-crds
      version: 21.0.0
      sourceRef:
        kind: HelmRepository
        name: prometheus-community
        namespace: flux-system
  install:
    crds: CreateReplace
    remediation: { retries: 3 }
  upgrade:
    crds: CreateReplace
    remediation: { retries: 3 }
