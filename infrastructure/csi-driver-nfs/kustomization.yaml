apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - namespace.yaml
  - helmrepository.yaml
  - helmrelease.yaml
  - storageclass.yaml
configMapGenerator:
  - name: csi-driver-nfs-values
    namespace: csi-driver-nfs
    files:
      - values.yaml
generatorOptions:
  disableNameSuffixHash: true
