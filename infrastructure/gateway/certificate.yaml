apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: lab-wildcard
  namespace: gateway
spec:
  secretName: lab-wildcard-tls
  duration: 2160h
  renewBefore: 360h
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
  dnsNames:
    - "lab.<YOUR_DOMAIN>"
    - "*.lab.<YOUR_DOMAIN>"
