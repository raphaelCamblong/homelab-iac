apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: observability
resources:
  - helmrelease.yaml
  - httproute.yaml
  - admin-secret.sops.yaml
configMapGenerator:
  - name: grafana-values
    namespace: observability
    files:
      - values.yaml
  # Envoy Clusters (gnetId 11021) — per-cluster (HTTPRoute backend) request,
  # connection, and traffic stats. Works directly with cilium-envoy's metrics.
  # substitute: disabled — dashboard JSONs contain Grafana ${...} template
  # syntax that breaks Flux's postBuild envsubst (only ${DOMAIN} in the
  # HTTPRoute needs substitution, never the dashboards).
  - name: dashboard-envoy-clusters
    namespace: observability
    files:
      - dashboards/envoy-clusters.json
    options:
      labels:
        grafana_dashboard: "1"
      annotations:
        kustomize.toolkit.fluxcd.io/substitute: disabled
  - name: dashboard-hubble-l7-http
    namespace: observability
    files:
      - dashboards/hubble-l7-http.json
    options:
      labels:
        grafana_dashboard: "1"
      annotations:
        kustomize.toolkit.fluxcd.io/substitute: disabled
  - name: dashboard-longhorn
    namespace: observability
    files:
      - dashboards/longhorn.json
    options:
      labels:
        grafana_dashboard: "1"
      annotations:
        kustomize.toolkit.fluxcd.io/substitute: disabled
generatorOptions:
  disableNameSuffixHash: true
