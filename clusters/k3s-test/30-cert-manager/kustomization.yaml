apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
# No top-level `namespace:`. HelmRepository must stay in flux-system; everything
# else carries its own namespace or is cluster-scoped (ClusterIssuer).
resources:
  - namespace.yaml
  - helmrepository.yaml
  - helmrelease.yaml
configMapGenerator:
  - name: cert-manager-values
    namespace: cert-manager
    files:
      - values.yaml
generatorOptions:
  disableNameSuffixHash: true
