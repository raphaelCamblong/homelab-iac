apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
# k3s-test overlay: copies of base manifests (kustomize LoadRestrictionsRootOnly
# prevents referencing files outside the overlay root via kubectl apply -k).
#
# The TUNNEL_TOKEN Secret is NOT in the overlay — created out-of-band via
# `kubectl -n cloudflared create secret generic cloudflared-tunnel \
#    --from-literal=tunnel-token=<TOKEN>`
# Keeps the token out of git for the test cluster (prod path uses SOPS).
resources:
  - namespace.yaml
  - deployment.yaml
