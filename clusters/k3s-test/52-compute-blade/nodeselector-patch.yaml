# k3s-test-only: pin the DaemonSet to k3s-server-0 (192.168.1.41) only.
#
# Why: k3s-agent-0 (192.168.1.13, kernel 6.8.0-1053-raspi / Ubuntu 24.04)
# refuses to release GPIO20 (`pwr_button` line) to userspace — libgpiod
# returns EBUSY even after a fresh reboot. .41 (kernel 6.14.0-1019-raspi /
# Ubuntu 25.04) handles the same claim cleanly. Likely a kernel/devicetree
# delta in the older Raspberry Pi BSP. Wiping the OS to match .41 would
# fix it, but the eventual Talos+CM5 prod cluster will have three uniform
# nodes with no GPIO contention — investing in a deeper fix isn't worth it
# for this throwaway cluster.
#
# Drop this patch when porting to Talos: the prod DaemonSet schedules on
# every node.
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: compute-blade-agent
  namespace: compute-blade
spec:
  template:
    spec:
      nodeSelector:
        kubernetes.io/hostname: k3s-server-0
