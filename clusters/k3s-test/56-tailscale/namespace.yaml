apiVersion: v1
kind: Namespace
metadata:
  name: tailscale
  # ponytail: baseline (not restricted). tailscale/tailscale runs containerboot
  # as root and needs a writable state path; userspace mode means no NET_ADMIN /
  # /dev/net/tun, so baseline is enough. Tighten to restricted+non-root only if
  # it ever matters.
  labels:
    pod-security.kubernetes.io/enforce: baseline
    pod-security.kubernetes.io/audit: baseline
    pod-security.kubernetes.io/warn: baseline
