# Claims the static media-data PV. Bound via the PV's claimRef (above), not
# label selector — explicit 1:1 binding avoids any ambiguity if other RWX
# claims ever appear.
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: media-data
  namespace: media
spec:
  accessModes:
    - ReadWriteMany
  storageClassName: ""
  resources:
    requests:
      storage: 4Ti
  volumeName: media-data
