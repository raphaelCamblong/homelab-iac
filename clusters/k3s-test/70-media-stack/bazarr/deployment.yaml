apiVersion: apps/v1
kind: Deployment
metadata:
  name: bazarr
  namespace: media
  labels: { app.kubernetes.io/name: bazarr }
spec:
  replicas: 1
  strategy: { type: Recreate }
  selector:
    matchLabels: { app.kubernetes.io/name: bazarr }
  template:
    metadata:
      labels: { app.kubernetes.io/name: bazarr }
    spec:
      securityContext:
        fsGroup: 3000
      containers:
        - name: bazarr
          image: lscr.io/linuxserver/bazarr:latest
          imagePullPolicy: IfNotPresent
          env:
            - { name: PUID, value: "3000" }
            - { name: PGID, value: "3000" }
            - { name: TZ,   value: Europe/Paris }
          ports:
            - { name: http, containerPort: 6767, protocol: TCP }
          volumeMounts:
            - { name: config, mountPath: /config }
            - { name: data,   mountPath: /data }    # writes .srt next to .mkv via ffprobe
          resources:
            requests: { memory: 150Mi, cpu: 100m }
            limits:   { memory: 400Mi }
          readinessProbe:
            tcpSocket: { port: http }
            initialDelaySeconds: 30
            periodSeconds: 15
      volumes:
        - name: config
          persistentVolumeClaim: { claimName: bazarr-config }
        - name: data
          persistentVolumeClaim: { claimName: media-data }
