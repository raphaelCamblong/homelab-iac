# Persistent state for Recyclarr — the config-templates + trash-guides git
# clones AND the local "what Custom Formats / Profiles I created" state file
# live here. Without persistence, Recyclarr forgets prior creates and Radarr
# rejects re-create with "CFs with matching names already exist".
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: recyclarr-state
  namespace: media
spec:
  accessModes: [ReadWriteOnce]
  storageClassName: longhorn
  resources:
    requests:
      storage: 500Mi
