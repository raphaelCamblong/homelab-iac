apiVersion: batch/v1
kind: CronJob
metadata:
  name: recyclarr
  namespace: media
spec:
  schedule: "30 4 * * *"        # daily at 04:30 local (TZ via container env)
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 1
      template:
        spec:
          restartPolicy: Never
          securityContext:
            runAsUser: 3000
            runAsGroup: 3000
            fsGroup: 3000
          containers:
            - name: recyclarr
              image: ghcr.io/recyclarr/recyclarr:latest
              imagePullPolicy: IfNotPresent
              # state repair --adopt claims any existing-by-name Custom Formats
              # in Radarr into recyclarr's local state (no-op on fresh clusters,
              # fixes "CFs with matching names already exist" errors after a
              # failed prior sync — which can happen if config schema changes).
              command: ["sh", "-c"]
              args:
                - |
                  recyclarr state repair --adopt --config /cfg/recyclarr.yml || true
                  exec recyclarr sync --config /cfg/recyclarr.yml
              env:
                - { name: TZ, value: Europe/Paris }
                - name: RADARR_API_KEY
                  valueFrom:
                    secretKeyRef:
                      name: media-stack-api-keys   # consolidated; see ../SETUP.md
                      key: radarr
              volumeMounts:
                # Recyclarr writes state (config-templates + trash-guides git
                # clones, "what I created in Radarr" tracking) under /config.
                # PVC-backed so Recyclarr remembers prior creates and re-runs
                # are idempotent instead of crashing on "already exists".
                - { name: cfg,   mountPath: /cfg,    readOnly: true }
                - { name: state, mountPath: /config }
              resources:
                requests: { memory: 64Mi, cpu: 50m }
                limits:   { memory: 256Mi }
          volumes:
            - name: cfg
              configMap:
                name: recyclarr-config
            - name: state
              persistentVolumeClaim:
                claimName: recyclarr-state
