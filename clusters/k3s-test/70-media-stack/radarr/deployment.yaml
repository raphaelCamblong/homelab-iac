apiVersion: apps/v1
kind: Deployment
metadata:
  name: radarr
  namespace: media
  labels: { app.kubernetes.io/name: radarr }
spec:
  replicas: 1
  strategy: { type: Recreate }
  selector:
    matchLabels: { app.kubernetes.io/name: radarr }
  template:
    metadata:
      labels: { app.kubernetes.io/name: radarr }
    spec:
      securityContext:
        fsGroup: 3000
      containers:
        - name: radarr
          image: lscr.io/linuxserver/radarr:latest
          imagePullPolicy: IfNotPresent
          env:
            - { name: PUID, value: "3000" }
            - { name: PGID, value: "3000" }
            - { name: TZ,   value: Europe/Paris }
            # Servarr env-var overrides — see ../prowlarr/deployment.yaml for rationale.
            - name: RADARR__AUTH__APIKEY
              valueFrom:
                secretKeyRef: { name: media-stack-api-keys, key: radarr }
            - { name: RADARR__AUTH__METHOD,   value: Forms }
            - { name: RADARR__AUTH__REQUIRED, value: DisabledForLocalAddresses }
          ports:
            - { name: http, containerPort: 7878, protocol: TCP }
          volumeMounts:
            - { name: config, mountPath: /config }
            - { name: data,   mountPath: /data }   # SPEC hardlink contract — same path as qBit on NAS
          resources:
            requests: { memory: 200Mi, cpu: 100m }
            limits:   { memory: 512Mi }
          readinessProbe:
            httpGet: { path: /ping, port: http }
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /ping, port: http }
            initialDelaySeconds: 60
            periodSeconds: 30
      volumes:
        - name: config
          persistentVolumeClaim: { claimName: radarr-config }
        - name: data
          persistentVolumeClaim: { claimName: media-data }
