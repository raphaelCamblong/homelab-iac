apiVersion: apps/v1
kind: Deployment
metadata:
  name: jellyseerr
  namespace: media
  labels: { app.kubernetes.io/name: jellyseerr }
spec:
  replicas: 1
  strategy: { type: Recreate }
  selector:
    matchLabels: { app.kubernetes.io/name: jellyseerr }
  template:
    metadata:
      labels: { app.kubernetes.io/name: jellyseerr }
    spec:
      securityContext:
        # fallenbagel/jellyseerr writes to /app/config; runs as root by default
        # in the image. Setting runAsUser keeps it within baseline PSA.
        runAsUser: 3000
        runAsGroup: 3000
        fsGroup: 3000
      containers:
        - name: jellyseerr
          image: fallenbagel/jellyseerr:latest
          imagePullPolicy: IfNotPresent
          env:
            - { name: TZ, value: Europe/Paris }
            - { name: LOG_LEVEL, value: info }
          ports:
            - { name: http, containerPort: 5055, protocol: TCP }
          volumeMounts:
            - { name: config, mountPath: /app/config }
          resources:
            requests: { memory: 150Mi, cpu: 50m }
            limits:   { memory: 384Mi }
          readinessProbe:
            httpGet: { path: /api/v1/status, port: http }
            initialDelaySeconds: 20
            periodSeconds: 10
      volumes:
        - name: config
          persistentVolumeClaim: { claimName: jellyseerr-config }
