# Selector-less ClusterIP Service. Endpoints come from the manual
# EndpointSlice below (Jellyfin runs on the NAS, not in the cluster).
# Routes traffic from cluster Gateway → NAS:8096 so Cilium/Hubble
# observe the flow.
apiVersion: v1
kind: Service
metadata:
  name: jellyfin-nas
  namespace: media
spec:
  type: ClusterIP
  ports:
    - { name: http, port: 8096, targetPort: 8096, protocol: TCP }
