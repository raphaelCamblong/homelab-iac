# Grafana chart 10.5.15 — pinned 2026-05-15.
# Exposed via HTTPRoute (clusters/homelab/infrastructure/observability/grafana/httproute.yaml)
# behind the Gateway at grafana.lab.<YOUR_DOMAIN>.
#
# Dashboards model: ConfigMap-based + sidecar reconciliation (NOT init-container
# writing to PVC). Every dashboard listed under `dashboards.default.<name>`
# below is rendered by the chart as a ConfigMap labeled `grafana_dashboard=1`.
# A small kiwigrid/k8s-sidecar runs alongside Grafana, watches those ConfigMaps,
# and writes/updates/REMOVES the corresponding JSON files in /tmp/dashboards.
# That means renaming or deleting a dashboard key here is fully reconciled —
# no orphan files accumulate on the PVC, and there is no path by which a
# UI-side manual change would survive a pod restart. Everything is in git.
persistence:
  enabled: true
  storageClassName: longhorn
  size: 5Gi
# RWO PVC + 1 replica → rolling updates deadlock (new pod waits for the old
# to release the volume, but the chart's default RollingUpdate strategy needs
# the new pod up before terminating the old). Recreate avoids this.
deploymentStrategy:
  type: Recreate
service:
  type: ClusterIP
  port: 80

# The VictoriaLogs datasource is a Grafana plugin (NOT bundled) — installed at
# pod boot via the chart's `plugins:` field. Pinning isn't supported here;
# Grafana fetches the latest compatible build.
plugins:
  - victoriametrics-logs-datasource

# Admin credentials come from the SOPS-encrypted Secret grafana-admin (generated
# at action time — see clusters/homelab/infrastructure/observability/grafana/README.md).
# This prevents the chart's default admin/admin from being live on the LAN.
admin:
  existingSecret: grafana-admin
  userKey: admin-user
  passwordKey: admin-password

datasources:
  datasources.yaml:
    apiVersion: 1
    datasources:
      - name: VictoriaMetrics
        type: prometheus
        url: http://vmsingle-vm.observability.svc:8428
        access: proxy
        isDefault: true
      - name: VictoriaLogs
        type: victoriametrics-logs-datasource
        url: http://vlogs.observability.svc:9428
        access: proxy

# Sidecar that watches ConfigMaps labeled `grafana_dashboard=1` and writes them
# to /tmp/dashboards inside the Grafana container. SCProvider auto-generates
# the matching `dashboardProviders` entry — so do NOT also declare one here.
#
# searchNamespace: ALL means the sidecar picks up dashboards shipped by other
# charts too: vm-stack alone provides ~16 (kubernetes-views-*,
# victoriametrics-*, node-exporter-full, alertmanager-overview, etcd, ...).
sidecar:
  dashboards:
    enabled: true
    SCProvider: true
    label: grafana_dashboard
    labelValue: "1"
    folder: /tmp/dashboards
    searchNamespace: ALL

# NOTE: dashboards are NOT defined inline here. The chart's
# `dashboards.<provider>.<name>.gnetId` mechanism produces empty ConfigMaps
# under sidecar mode (the gnetId fetch only runs in the init-container path,
# which sidecar replaces). Instead we bundle dashboard JSONs into the repo at
# clusters/homelab/infrastructure/observability/grafana/dashboards/ and wrap
# them in labeled ConfigMaps via configMapGenerator in kustomization.yaml.
# This is pure GitOps: no runtime grafana.com fetch, full reconciliation on
# rename/delete, and dashboards survive every reprovision.
