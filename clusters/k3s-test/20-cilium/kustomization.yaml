apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
# NOTE: no top-level `namespace:`. HelmRepository must stay in flux-system
# (sourceRef in HelmRelease is fixed at that namespace); everything else
# already carries its own namespace metadata or is cluster-scoped.
resources:
  - helmrepository.yaml
  - helmrelease.yaml
  - l2-pool.yaml
  - hubble-httproute.yaml
configMapGenerator:
  - name: cilium-values
    namespace: kube-system
    files:
      - values.yaml
generatorOptions:
  disableNameSuffixHash: true
