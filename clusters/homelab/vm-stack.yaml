apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: vm-stack
  namespace: flux-system
spec:
  interval: 1h
  retryInterval: 2m
  timeout: 15m
  path: ./clusters/homelab/infrastructure/observability/vm-stack
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  dependsOn:
    - name: observability-base
  healthChecks:
    - apiVersion: helm.toolkit.fluxcd.io/v2
      kind: HelmRelease
      name: vm-stack
      namespace: observability
