apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: vm-stack
  namespace: flux-system
spec:
  interval: 1h
  retryInterval: 2m
  timeout: 15m
  path: ./infrastructure/observability/vm-stack
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  dependsOn:
    - name: observability-base
    # vm-operator crashloops without the monitoring.coreos.com CRDs.
    - name: prometheus-operator-crds
  healthChecks:
    - apiVersion: helm.toolkit.fluxcd.io/v2
      kind: HelmRelease
      name: vm-stack
      namespace: observability
  patches:
    - target:
        kind: HelmRelease
        name: vm-stack
        namespace: observability
      patch: |
        apiVersion: helm.toolkit.fluxcd.io/v2
        kind: HelmRelease
        metadata:
          name: vm-stack
          namespace: observability
        spec:
          values:
            vmsingle:
              spec:
                storage:
                  resources:
                    requests:
                      storage: 5Gi
