apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: prometheus-operator-crds
  namespace: flux-system
spec:
  interval: 1h
  retryInterval: 2m
  timeout: 5m
  path: ./infrastructure/prometheus-operator-crds
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  dependsOn:
    - name: observability-base
  healthChecks:
    - { apiVersion: helm.toolkit.fluxcd.io/v2, kind: HelmRelease, name: prometheus-operator-crds, namespace: observability }
