apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: csi-driver-nfs
  namespace: flux-system
spec:
  interval: 1h
  retryInterval: 1m
  timeout: 10m
  path: ./infrastructure/csi-driver-nfs
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  dependsOn:
    - name: cilium
  # 2-node cluster: the base runs 2 controller replicas, but the controller is
  # hostNetwork, so two replicas on one node collide on the liveness port
  # (127.0.0.1:29652 "address already in use") → permanent CrashLoop. On 2 nodes
  # any single-node blip co-locates them. NFS-CSI is provisioning-only here
  # (Longhorn is primary storage), so one replica is plenty. Base stays 2 for
  # the future 3-node Talos cluster where replicas spread across distinct nodes.
  patches:
    - patch: |
        apiVersion: helm.toolkit.fluxcd.io/v2
        kind: HelmRelease
        metadata:
          name: csi-driver-nfs
          namespace: csi-driver-nfs
        spec:
          values:
            controller:
              replicas: 1
      target:
        kind: HelmRelease
        name: csi-driver-nfs
  healthChecks:
    - apiVersion: helm.toolkit.fluxcd.io/v2
      kind: HelmRelease
      name: csi-driver-nfs
      namespace: csi-driver-nfs
