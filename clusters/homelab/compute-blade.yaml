apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: compute-blade
  namespace: flux-system
spec:
  interval: 15m
  retryInterval: 1m
  timeout: 5m
  path: ./clusters/homelab/infrastructure/compute-blade
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  dependsOn:
    - name: cilium
