apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
# Explicit list — auto-discovery silently drops renamed/new files.
resources:
  - cluster-vars.yaml
  - gateway-api-crds.yaml
  - cilium.yaml
  - cert-manager.yaml
  - gateway.yaml
  - longhorn.yaml
  - csi-driver-nfs.yaml
  - compute-blade.yaml
  - headlamp.yaml
  - observability-base.yaml
  - prometheus-operator-crds.yaml
  - vm-stack.yaml
  - victoria-logs.yaml
  - alloy.yaml
  - grafana.yaml
  # backup.yaml: Talos-only (etcd snapshots), re-add on Talos rollout
  - flux-receiver.yaml
  - media-stack.yaml
  - cloudflared.yaml
  # - tailscale.yaml # needs authkey — re-enable after seeding tailscale-auth.sops.yaml
