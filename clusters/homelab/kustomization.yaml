apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
# Explicit list — auto-discovery silently drops renamed/new files.
resources:
  - flux-system
  - cluster-vars.yaml
  - gateway-api-crds.yaml
  - cilium.yaml
  - cert-manager.yaml
  - gateway.yaml
  - longhorn.yaml
  - csi-driver-nfs.yaml
  - compute-blade.yaml
  - headlamp.yaml
  - observability-base.yaml
  - prometheus-operator-crds.yaml
  - vm-stack.yaml
  - victoria-logs.yaml
  - alloy.yaml
  - grafana.yaml
  # backup.yaml: Talos-only (etcd snapshots), re-add on Talos rollout
  # flux-receiver: removed — smee image unpullable on arm64, lab.* hosts are
  # LAN-only so GitHub can't reach a Receiver anyway, and the GitRepository
  # polls every 1m. Re-add via tunnel public hostname + HTTPRoute →
  # webhook-receiver svc if sub-minute sync ever matters (see git history).
  - media-stack.yaml
  - cloudflared.yaml
  - tailscale.yaml
