apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
# Explicit aggregator of every top-level Flux Kustomization.
# Without this, kustomize-controller auto-discovers files in this directory —
# fine until a rename or new file silently drops out of sync. Explicit is safer.
resources:
  - gateway-api-crds.yaml
  - cilium.yaml
  - longhorn.yaml
  - csi-driver-nfs.yaml
  - compute-blade.yaml
  - headlamp.yaml
  - observability-base.yaml
  - vm-stack.yaml
  - loki.yaml
  - alloy.yaml
  - grafana.yaml
  - backup.yaml
  - flux-receiver.yaml
