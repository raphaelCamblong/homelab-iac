apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: flux-receiver
  namespace: flux-system
spec:
  interval: 1h
  retryInterval: 1m
  timeout: 5m
  path: ./infrastructure/flux-receiver
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  # No dependsOn — this is what enables fast reconciles for everything else.
  decryption:
    provider: sops
    secretRef:
      name: sops-age
  healthChecks:
    - apiVersion: notification.toolkit.fluxcd.io/v1
      kind: Receiver
      name: github-receiver
      namespace: flux-system
    - apiVersion: apps/v1
      kind: Deployment
      name: smee-client
      namespace: flux-system
