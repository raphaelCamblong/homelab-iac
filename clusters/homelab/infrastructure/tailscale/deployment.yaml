apiVersion: apps/v1
kind: Deployment
metadata:
  name: tailscale
  namespace: tailscale
  labels: { app.kubernetes.io/name: tailscale }
spec:
  # ponytail: single node. One replica == one tailnet identity (they'd fight over
  # the shared state Secret otherwise). HA subnet routing = a second replica with
  # its OWN state Secret; add only if failover matters.
  replicas: 1
  revisionHistoryLimit: 2
  strategy: { type: Recreate }
  selector:
    matchLabels: { app.kubernetes.io/name: tailscale }
  template:
    metadata:
      labels: { app.kubernetes.io/name: tailscale }
    spec:
      serviceAccountName: tailscale
      containers:
        - name: tailscale
          image: tailscale/tailscale:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: TS_AUTHKEY
              valueFrom:
                secretKeyRef:
                  name: tailscale-auth
                  key: authkey
            # State in a k8s Secret, not on disk → survives pod restarts.
            - name: TS_KUBE_SECRET
              value: tailscale-state
            # Userspace networking: no NET_ADMIN, no /dev/net/tun host mount.
            # ponytail: userspace is slower than kernel routing. If subnet-router
            # throughput ever matters, drop this, add NET_ADMIN + a tun device.
            - name: TS_USERSPACE
              value: "true"
            # Advertise the home LAN so tailnet clients reach it via this node.
            # Routes still need one-time approval in the Tailscale admin console.
            # Add the cluster Service CIDR here (k3s 10.43.0.0/16, Talos
            # 10.96.0.0/12) to reach ClusterIPs over the tailnet.
            - name: TS_ROUTES
              value: "192.168.1.0/24"
            - name: TS_HOSTNAME
              value: homelab
          securityContext:
            allowPrivilegeEscalation: false
            capabilities: { drop: [ALL] }
          resources:
            requests: { cpu: 50m, memory: 64Mi }
            limits:   { cpu: 500m, memory: 128Mi }
