apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: flux-system
# secret.sops.yaml (Receiver HMAC token) and smee-config.sops.yaml (smee URL +
# receiver path) are generated at action time — see README.md.
resources:
  - receiver.yaml
  - smee-client.yaml
  - secret.sops.yaml
  - smee-config.sops.yaml
