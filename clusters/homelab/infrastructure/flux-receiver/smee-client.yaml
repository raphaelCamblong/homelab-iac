# smee.io relay: avoids exposing the cluster directly to the internet for
# GitHub webhooks. Long-polls smee, forwards each delivery to the in-cluster
# webhook-receiver Service.
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: smee-client
  namespace: flux-system
  labels:
    app.kubernetes.io/name: smee-client
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: smee-client
  template:
    metadata:
      labels:
        app.kubernetes.io/name: smee-client
    spec:
      containers:
        - name: smee
          image: ghcr.io/probot/smee-client:latest
          args:
            - "--url"
            - "$(SMEE_URL)"
            - "--target"
            - "http://webhook-receiver.flux-system.svc.cluster.local/$(RECEIVER_PATH)"
          env:
            - name: SMEE_URL
              valueFrom:
                secretKeyRef:
                  name: smee-config
                  key: url
            - name: RECEIVER_PATH
              valueFrom:
                secretKeyRef:
                  name: smee-config
                  key: path
          resources:
            requests:
              cpu: 5m
              memory: 32Mi
            limits:
              memory: 128Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 1000
            capabilities:
              drop: [ALL]
