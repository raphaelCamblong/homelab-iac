apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: kube-system
resources:
  - helmrepository.yaml
  - helmrelease.yaml
  - l2-pool.yaml
  - hubble-httproute.yaml
configMapGenerator:
  - name: cilium-values
    namespace: kube-system
    files:
      - values.yaml
generatorOptions:
  disableNameSuffixHash: true
