# Cilium chart 1.19.4 — pinned 2026-05-15.
# Acts as CNI + kube-proxy replacement + service LB (L2 announcements)
# + ingress (Gateway API) + transparent pod encryption (WireGuard)
# + network observability (Hubble). Talos requires the capability + cgroup
# overrides below — they are NOT optional for kube-proxy-free Talos.
ipam:
  mode: kubernetes

kubeProxyReplacement: true
k8sServiceHost: 192.168.1.140
k8sServicePort: 6443

# Required for kube-proxy replacement on Talos. IPC_LOCK + SYS_ADMIN are
# the wide-surface ones — needed for eBPF map pinning + cgroup ops + WireGuard
# — but every cap below is justified by a specific Cilium subsystem.
securityContext:
  capabilities:
    ciliumAgent:
      - CHOWN
      - KILL
      - NET_ADMIN
      - NET_RAW
      - IPC_LOCK
      - SYS_ADMIN
      - SYS_RESOURCE
      - DAC_OVERRIDE
      - FOWNER
      - SETGID
      - SETUID
    cleanCiliumState:
      - NET_ADMIN
      - SYS_ADMIN
      - SYS_RESOURCE

cgroup:
  autoMount:
    enabled: false
  hostRoot: /sys/fs/cgroup

# L2 announcements for Service LoadBalancer (replaces MetalLB)
l2announcements:
  enabled: true
externalIPs:
  enabled: true
k8sClientRateLimit:
  qps: 50
  burst: 100

# Pod-to-pod transparent encryption only.
# nodeEncryption is disabled: encrypting host-to-host traffic (kubelet, etcd)
# adds non-trivial CPU on 4-core CM5s for limited threat-model gain on a LAN.
encryption:
  enabled: true
  type: wireguard
  nodeEncryption: false

# Hubble (network observability)
hubble:
  enabled: true
  relay:
    enabled: true
  ui:
    enabled: true

# Gateway API (requires CRDs installed first — see gateway-api-crds Kustomization)
gatewayAPI:
  enabled: true

operator:
  replicas: 2

# Recommended on small clusters
rollOutCiliumPods: true
