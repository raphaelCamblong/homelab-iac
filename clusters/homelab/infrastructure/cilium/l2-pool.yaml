---
apiVersion: cilium.io/v2
kind: CiliumLoadBalancerIPPool
metadata:
  name: lan-pool
spec:
  blocks:
    # Must stay outside the router's DHCP range.
    - start: 192.168.1.200
      stop: 192.168.1.250
---
apiVersion: cilium.io/v2alpha1
kind: CiliumL2AnnouncementPolicy
metadata:
  name: default
spec:
  # end0 = on-SoC Broadcom NIC on Pi 5 / CM5; NOT enX0 (Xen-guest naming).
  interfaces:
    - end0
  externalIPs: true
  loadBalancerIPs: true
