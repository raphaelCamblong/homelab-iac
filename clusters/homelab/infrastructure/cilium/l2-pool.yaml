---
# Promoted to v2 in Cilium 1.18 — v2alpha1 still served as deprecated alias.
apiVersion: cilium.io/v2
kind: CiliumLoadBalancerIPPool
metadata:
  name: lan-pool
spec:
  blocks:
    - start: 192.168.1.200
      stop: 192.168.1.220
---
apiVersion: cilium.io/v2alpha1
kind: CiliumL2AnnouncementPolicy
metadata:
  name: default
spec:
  # end0 = on-SoC Broadcom NIC on Pi 5 / CM5 (systemd-predictable naming).
  # enX0 is the Xen-guest interface name; wrong here.
  interfaces:
    - end0
  externalIPs: true
  loadBalancerIPs: true
