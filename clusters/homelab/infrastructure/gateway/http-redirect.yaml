# Catch-all HTTP→HTTPS redirect attached to the Gateway's :80 listener.
# Any hostname coming in on plain HTTP gets a 301 to https.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: http-to-https-redirect
  namespace: gateway
spec:
  parentRefs:
    - kind: Gateway
      name: cilium
      sectionName: http
  rules:
    - filters:
        - type: RequestRedirect
          requestRedirect:
            scheme: https
            statusCode: 301
