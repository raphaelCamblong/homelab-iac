# loki chart 14.2.0 (grafana-community OSS fork) — pinned 2026-05-15.
# Why community fork: grafana/loki 7.x is Grafana Enterprise Logs only since 2026-03-16.
# Persistence: 5Gi × 3 Longhorn replicas = 15Gi NVMe. Bump if log volume warrants.
deploymentMode: SingleBinary
loki:
  auth_enabled: false
  storage:
    type: filesystem
  schemaConfig:
    configs:
      - from: "2024-01-01"
        store: tsdb
        object_store: filesystem
        schema: v13
        index:
          prefix: index_
          period: 24h
  # PLATFORM spec: 7-day log retention. Without these two, logs grow until the
  # 5Gi PVC fills and Loki fails to write.
  limits_config:
    retention_period: 168h
  compactor:
    retention_enabled: true
    delete_request_store: filesystem
singleBinary:
  replicas: 1
  persistence:
    enabled: true
    storageClass: longhorn
    size: 5Gi
# Loki chart validate.yaml rejects the install if BOTH monolithic and
# scalable replicas are > 0. The chart defaults `read/write/backend` to 3
# replicas each — clobber them to 0 since deploymentMode=SingleBinary.
read:
  replicas: 0
write:
  replicas: 0
backend:
  replicas: 0
chunksCache:
  enabled: false
resultsCache:
  enabled: false
test:
  enabled: false
monitoring:
  selfMonitoring:
    enabled: false
    grafanaAgent:
      installOperator: false
  lokiCanary:
    enabled: false
