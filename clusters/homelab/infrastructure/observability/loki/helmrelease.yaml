apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: loki
  namespace: observability
spec:
  interval: 1h
  chart:
    spec:
      chart: loki
      # grafana/loki 7.x is GEL-only (Mar 2026). OSS users use grafana-community/loki.
      version: 14.2.0
      sourceRef:
        kind: HelmRepository
        name: grafana-community
        namespace: flux-system
  valuesFrom:
    - kind: ConfigMap
      name: loki-values
      valuesKey: values.yaml
