apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: vm-stack
  namespace: observability
spec:
  interval: 1h
  chart:
    spec:
      chart: victoria-metrics-k8s-stack
      version: 0.78.0
      sourceRef:
        kind: HelmRepository
        name: vm
        namespace: flux-system
  install:
    crds: CreateReplace
    # Default 5m flakes on first install (~96 resources + vm-operator restart cycle).
    timeout: 10m
    remediation:
      retries: 3
  upgrade:
    crds: CreateReplace
    timeout: 10m
    remediation:
      retries: 3
  valuesFrom:
    - kind: ConfigMap
      name: vm-stack-values
      valuesKey: values.yaml
