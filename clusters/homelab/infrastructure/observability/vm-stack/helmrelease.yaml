apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: vm-stack
  namespace: observability
spec:
  interval: 1h
  chart:
    spec:
      chart: victoria-metrics-k8s-stack
      version: 0.78.0
      sourceRef:
        kind: HelmRepository
        name: vm
        namespace: flux-system
  install:
    crds: CreateReplace
    # 10m: chart brings up ~96 resources including vm-operator that briefly
    # crashloops while prometheus-operator-crds subchart registers field
    # indexers. Default 5m flakes on first install — measured on Pi NVMe arm64.
    timeout: 10m
    remediation:
      retries: 3
  upgrade:
    crds: CreateReplace
    timeout: 10m
    remediation:
      retries: 3
  valuesFrom:
    - kind: ConfigMap
      name: vm-stack-values
      valuesKey: values.yaml
