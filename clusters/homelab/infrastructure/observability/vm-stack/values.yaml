# victoria-metrics-k8s-stack chart 0.78.0 — pinned 2026-05-15.
# Bundled stack — single release, multiple components.
fullnameOverride: vm

# Disable vmcluster mode — use single-node vmsingle (right size for 3-node cluster).
vmcluster:
  enabled: false

vmsingle:
  enabled: true
  spec:
    retentionPeriod: "30d"
    storage:
      accessModes: [ReadWriteOnce]
      storageClassName: longhorn
      resources:
        requests:
          storage: 20Gi
    extraArgs:
      maxLabelsPerTimeseries: "40"

# vmagent scrapes everything (kubelet/cAdvisor/apiserver/etc via defaults + KSM + node-exporter)
vmagent:
  enabled: true
  spec:
    selectAllByDefault: true # picks up VMServiceScrape from any namespace
    scrapeInterval: 30s

# Alerting — keep enabled but lightweight
vmalert:
  enabled: true
  spec:
    evaluationInterval: 30s
# Renamed from `vmalertmanager:` to `alertmanager:` in chart 0.78.
alertmanager:
  enabled: true
  spec:
    replicaCount: 1
    storage:
      accessModes: [ReadWriteOnce]
      storageClassName: longhorn
      resources:
        requests:
          storage: 1Gi

# Standard exporters
kube-state-metrics:
  enabled: true
prometheus-node-exporter:
  enabled: true

# Default scrape configs and dashboards from the chart
defaultRules:
  create: true
grafana:
  enabled: false # Grafana installed separately so we control datasources
