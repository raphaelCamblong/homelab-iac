apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: victoria-logs
  namespace: observability
spec:
  interval: 1h
  chart:
    spec:
      chart: victoria-logs-single
      version: 0.12.1
      sourceRef:
        kind: HelmRepository
        name: vm
        namespace: flux-system
  install:
    timeout: 10m
    remediation:
      retries: 3
  upgrade:
    timeout: 10m
    remediation:
      retries: 3
  valuesFrom:
    - kind: ConfigMap
      name: victoria-logs-values
      valuesKey: values.yaml
