apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: observability
resources:
  - helmrelease.yaml
  - httproute.yaml
  # admin-secret.sops.yaml is generated at action time — see README.md.
  - admin-secret.sops.yaml
configMapGenerator:
  - name: grafana-values
    namespace: observability
    files:
      - values.yaml
generatorOptions:
  disableNameSuffixHash: true
