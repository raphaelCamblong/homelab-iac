persistence:
  enabled: true
  storageClassName: longhorn
  size: 5Gi
# RWO PVC + 1 replica deadlocks RollingUpdate.
deploymentStrategy:
  type: Recreate
service:
  type: ClusterIP
  port: 80

# Not bundled; chart fetches latest compatible build at pod boot.
plugins:
  - victoriametrics-logs-datasource

# admin Secret generated at action time — see README.md.
admin:
  existingSecret: grafana-admin
  userKey: admin-user
  passwordKey: admin-password

datasources:
  datasources.yaml:
    apiVersion: 1
    datasources:
      - name: VictoriaMetrics
        type: prometheus
        url: http://vmsingle-vm.observability.svc:8428
        access: proxy
        isDefault: true
      - name: VictoriaLogs
        type: victoriametrics-logs-datasource
        url: http://vlogs.observability.svc:9428
        access: proxy

# SCProvider auto-generates the dashboardProviders entry — do NOT also declare one.
sidecar:
  dashboards:
    enabled: true
    SCProvider: true
    label: grafana_dashboard
    labelValue: "1"
    folder: /tmp/dashboards
    searchNamespace: ALL

# Dashboards are bundled as JSONs in ./dashboards/ wrapped by configMapGenerator
# in kustomization.yaml. The chart's `dashboards.<provider>.<name>.gnetId` path
# produces empty ConfigMaps under sidecar mode (gnetId fetch only runs in the
# init-container path, which sidecar replaces).
