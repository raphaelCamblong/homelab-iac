# Grafana chart 10.5.15 — pinned 2026-05-15.
# Exposed on the LB pool at .201 (LAN-only).
persistence:
  enabled: true
  storageClassName: longhorn
  size: 5Gi
service:
  type: LoadBalancer
  loadBalancerIP: 192.168.1.201

# Admin credentials come from the SOPS-encrypted Secret grafana-admin (generated
# at action time — see clusters/homelab/infrastructure/observability/grafana/README.md).
# This prevents the chart's default admin/admin from being live on the LAN.
admin:
  existingSecret: grafana-admin
  userKey: admin-user
  passwordKey: admin-password

datasources:
  datasources.yaml:
    apiVersion: 1
    datasources:
      - name: VictoriaMetrics
        type: prometheus
        url: http://vmsingle-vm.observability.svc:8429
        isDefault: true
      - name: Loki
        type: loki
        url: http://loki.observability.svc:3100
dashboardProviders:
  dashboardproviders.yaml:
    apiVersion: 1
    providers:
      - name: default
        type: file
        folder: ""
        options:
          path: /var/lib/grafana/dashboards/default
dashboards:
  default:
    cilium:
      gnetId: 16611
      revision: 1
      datasource: VictoriaMetrics
    longhorn:
      gnetId: 16888
      revision: 9
      datasource: VictoriaMetrics
    node-exporter:
      gnetId: 1860
      revision: 33
      datasource: VictoriaMetrics
