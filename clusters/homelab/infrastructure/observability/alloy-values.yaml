# Grafana Alloy chart 1.8.1 — pinned 2026-05-15.
# DaemonSet that tails /var/log/pods and pushes to Loki.
# Replaces Promtail. https://grafana.com/docs/alloy/latest/
alloy:
  configMap:
    create: true
    content: |
      // Discover pods, mount their log files, push to Loki.
      discovery.kubernetes "pods" {
        role = "pod"
      }

      discovery.relabel "pod_logs" {
        targets = discovery.kubernetes.pods.targets
        rule {
          source_labels = ["__meta_kubernetes_namespace"]
          target_label  = "namespace"
        }
        rule {
          source_labels = ["__meta_kubernetes_pod_name"]
          target_label  = "pod"
        }
        rule {
          source_labels = ["__meta_kubernetes_pod_container_name"]
          target_label  = "container"
        }
        rule {
          source_labels = ["__meta_kubernetes_pod_node_name"]
          target_label  = "node"
        }
      }

      loki.source.kubernetes "pods" {
        targets    = discovery.relabel.pod_logs.output
        forward_to = [loki.write.default.receiver]
      }

      loki.write "default" {
        endpoint {
          url = "http://loki.observability.svc:3100/loki/api/v1/push"
        }
      }

controller:
  type: daemonset
  tolerations:
    - operator: Exists # also run on control-plane-only nodes (we have none, but futureproof)
