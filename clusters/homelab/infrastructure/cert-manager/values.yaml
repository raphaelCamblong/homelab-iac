# cert-manager chart v1.20.2 — pinned 2026-05-15.
# Issues TLS certs via Let's Encrypt DNS-01 against Cloudflare. Native
# Gateway API support is on so Certificates referenced by Gateway listeners
# (clusters/homelab/infrastructure/gateway/certificate.yaml) are issued
# automatically.
crds:
  enabled: true
config:
  apiVersion: controller.config.cert-manager.io/v1alpha1
  kind: ControllerConfiguration
  enableGatewayAPI: true
# Two replicas of each controller would be wasteful on a 3-node cluster.
replicaCount: 1
webhook:
  replicaCount: 1
cainjector:
  replicaCount: 1
