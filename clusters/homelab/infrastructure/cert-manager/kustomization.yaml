apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: cert-manager
resources:
  - namespace.yaml
  - helmrepository.yaml
  - helmrelease.yaml
  - cloudflare-token.sops.yaml
  - clusterissuer-staging.yaml
  - clusterissuer-prod.yaml
configMapGenerator:
  - name: cert-manager-values
    namespace: cert-manager
    files:
      - values.yaml
generatorOptions:
  disableNameSuffixHash: true
