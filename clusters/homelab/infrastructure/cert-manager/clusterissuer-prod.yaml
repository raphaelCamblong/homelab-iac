apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
spec:
  acme:
    # Production Let's Encrypt — used by gateway/certificate.yaml.
    # Rate limit: 50 certs / domain / week (plenty).
    server: https://acme-v02.api.letsencrypt.org/directory
    email: ops@<YOUR_DOMAIN>
    privateKeySecretRef:
      name: letsencrypt-prod-account
    solvers:
      - dns01:
          cloudflare:
            # The Secret is in this same namespace (cert-manager) and is
            # generated at action time by sops-encrypting a Cloudflare
            # scoped API token (Zone:DNS:Edit + Zone:Zone:Read).
            apiTokenSecretRef:
              name: cloudflare-api-token
              key: api-token
