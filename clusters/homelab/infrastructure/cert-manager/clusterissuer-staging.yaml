apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-staging
spec:
  acme:
    # Staging issuer — use during initial Certificate testing to avoid
    # hitting Let's Encrypt prod rate limits (5 duplicate certs / week).
    server: https://acme-staging-v02.api.letsencrypt.org/directory
    email: ops@<YOUR_DOMAIN>
    privateKeySecretRef:
      name: letsencrypt-staging-account
    solvers:
      - dns01:
          cloudflare:
            apiTokenSecretRef:
              name: cloudflare-api-token
              key: api-token
