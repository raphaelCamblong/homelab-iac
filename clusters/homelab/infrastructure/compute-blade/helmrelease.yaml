apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: compute-blade-agent
  namespace: compute-blade
spec:
  interval: 15m
  chartRef:
    kind: OCIRepository
    name: compute-blade-agent
    namespace: flux-system
  valuesFrom:
    - kind: ConfigMap
      name: compute-blade-values
      valuesKey: values.yaml
