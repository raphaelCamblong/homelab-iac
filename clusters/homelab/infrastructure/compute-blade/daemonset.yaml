apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: compute-blade-agent
  namespace: compute-blade
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: compute-blade-agent
  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
  template:
    metadata:
      labels:
        app.kubernetes.io/name: compute-blade-agent
    spec:
      serviceAccountName: compute-blade-agent
      hostNetwork: true
      hostPID: true
      tolerations:
        - operator: Exists
      containers:
        - name: agent
          # Container image is published; Helm chart is not (project moved
          # from uptime-industries → compute-blade-community and switched to
          # deb/rpm). We run the binary directly via a hand-rolled DaemonSet.
          image: ghcr.io/compute-blade-community/compute-blade-agent:v0.11.2
          imagePullPolicy: IfNotPresent
          ports:
            - name: metrics
              containerPort: 9666
              protocol: TCP
          securityContext:
            privileged: true  # required for /dev/gpiomem + I2C + SoC temp sensors
          volumeMounts:
            - name: config
              mountPath: /etc/compute-blade-agent
              readOnly: true
            - name: dev
              mountPath: /dev
            - name: sys
              mountPath: /sys
          readinessProbe:
            tcpSocket:
              port: metrics
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              memory: 128Mi
      volumes:
        - name: config
          configMap:
            name: compute-blade-config
        - name: dev
          hostPath:
            path: /dev
        - name: sys
          hostPath:
            path: /sys
