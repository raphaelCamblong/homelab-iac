# NOTE: talos-secret.sops.yaml is created at action time
# (see talos-cluster-PLAN.md "Generate backup talosconfig" step).
# Listing it here so kustomize references it on first reconcile.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - namespace.yaml
  - pvc.yaml
  - talos-secret.sops.yaml
  - cronjob.yaml
