apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: headlamp
  namespace: headlamp
spec:
  interval: 15m
  chart:
    spec:
      chart: headlamp
      version: 0.42.0
      sourceRef:
        kind: HelmRepository
        name: headlamp
        namespace: flux-system
  valuesFrom:
    - kind: ConfigMap
      name: headlamp-values
      valuesKey: values.yaml
