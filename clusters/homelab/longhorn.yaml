apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: longhorn
  namespace: flux-system
spec:
  interval: 1h
  retryInterval: 2m
  timeout: 15m
  path: ./infrastructure/longhorn
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  dependsOn:
    - name: cilium
  healthChecks:
    - apiVersion: helm.toolkit.fluxcd.io/v2
      kind: HelmRelease
      name: longhorn
      namespace: longhorn-system
  postBuild:
    substituteFrom:
      - kind: ConfigMap
        name: cluster-vars
  patches:
    - target:
        kind: HelmRelease
        name: longhorn
        namespace: longhorn-system
      patch: |
        apiVersion: helm.toolkit.fluxcd.io/v2
        kind: HelmRelease
        metadata:
          name: longhorn
          namespace: longhorn-system
        spec:
          values:
            defaultSettings:
              defaultReplicaCount: 2
              taintToleration: ""
            persistence:
              defaultClassReplicaCount: 2
