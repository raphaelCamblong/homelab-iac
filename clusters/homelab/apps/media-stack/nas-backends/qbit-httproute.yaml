apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: qbit-nas
  namespace: media
spec:
  parentRefs:
    - kind: Gateway
      name: cilium
      namespace: gateway
      sectionName: https
  hostnames:
    - "qbit.lab.<YOUR_DOMAIN>"
  rules:
    - matches:
        - path: { type: PathPrefix, value: / }
      backendRefs:
        - name: qbit-nas
          port: 8080
