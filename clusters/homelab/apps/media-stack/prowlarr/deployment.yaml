apiVersion: apps/v1
kind: Deployment
metadata:
  name: prowlarr
  namespace: media
  labels: { app.kubernetes.io/name: prowlarr }
spec:
  replicas: 1
  strategy: { type: Recreate }   # RWO PVC — only one mounter
  selector:
    matchLabels: { app.kubernetes.io/name: prowlarr }
  template:
    metadata:
      labels: { app.kubernetes.io/name: prowlarr }
    spec:
      securityContext:
        fsGroup: 3000
      containers:
        - name: prowlarr
          image: lscr.io/linuxserver/prowlarr:latest
          imagePullPolicy: IfNotPresent
          env:
            - { name: PUID, value: "3000" }
            - { name: PGID, value: "3000" }
            - { name: TZ,   value: Europe/Paris }
            # PROWLARR__AUTH__APIKEY pins the ApiKey across fresh-PVC rebuilds
            # — env var wins over config.xml at runtime.
            - name: PROWLARR__AUTH__APIKEY
              valueFrom:
                secretKeyRef: { name: media-stack-api-keys, key: prowlarr }
            - { name: PROWLARR__AUTH__METHOD,   value: Forms }
            - { name: PROWLARR__AUTH__REQUIRED, value: DisabledForLocalAddresses }
          ports:
            - { name: http, containerPort: 9696, protocol: TCP }
          volumeMounts:
            - { name: config, mountPath: /config }
          resources:
            requests: { memory: 128Mi, cpu: 50m }
            limits:   { memory: 256Mi }
          readinessProbe:
            httpGet: { path: /ping, port: http }
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /ping, port: http }
            initialDelaySeconds: 60
            periodSeconds: 30
      volumes:
        - name: config
          persistentVolumeClaim: { claimName: prowlarr-config }
