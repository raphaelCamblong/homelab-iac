apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
# No top-level `namespace:` — PV is cluster-scoped, HTTPRoutes reference the gateway namespace.
resources:
  - namespace.yaml
  - media-pv.yaml
  - media-pvc.yaml

  - prowlarr/deployment.yaml
  - prowlarr/service.yaml
  - prowlarr/config-pvc.yaml
  - prowlarr/httproute.yaml

  - radarr/deployment.yaml
  - radarr/service.yaml
  - radarr/config-pvc.yaml
  - radarr/httproute.yaml

  - bazarr/deployment.yaml
  - bazarr/service.yaml
  - bazarr/config-pvc.yaml
  - bazarr/httproute.yaml

  - jellyseerr/deployment.yaml
  - jellyseerr/service.yaml
  - jellyseerr/config-pvc.yaml
  - jellyseerr/httproute.yaml

  - recyclarr/configmap.yaml
  - recyclarr/cronjob.yaml
  - recyclarr/state-pvc.yaml

  - secrets/api-keys.sops.yaml

  - nas-backends/jellyfin-service.yaml
  - nas-backends/jellyfin-endpointslice.yaml
  - nas-backends/jellyfin-httproute.yaml
  - nas-backends/qbit-service.yaml
  - nas-backends/qbit-endpointslice.yaml
  - nas-backends/qbit-httproute.yaml
